<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Todo.txt</title>
  <style>
    body { width: 360px; min-height: 320px; max-height: 480px; margin: 0; font-family: system-ui, sans-serif; font-size: 13px; display: flex; flex-direction: column; }
    .toolbar { padding: 6px 8px; border-bottom: 1px solid #ccc; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .toolbar button { padding: 4px 10px; border-radius: 4px; cursor: pointer; }
    .toolbar-primary { display: flex; gap: 6px; align-items: center; flex: 1; min-width: 0; }
    .toolbar-secondary { display: flex; gap: 4px; align-items: center; margin-left: 4px; padding-left: 8px; border-left: 1px solid #ddd; }
    .toolbar-link { display: inline-block; border: 1px solid #ccc; border-radius: 4px; padding: 4px 10px; font-size: 12px; text-decoration: none; color: inherit; background: transparent; cursor: pointer; white-space: nowrap; }
    .toolbar-link:hover { background: #f0f0f0; border-color: #aaa; }
    .toolbar-link:active { background: #e8e8e8; }
    .toolbar-icon { width: 28px; height: 28px; min-width: 28px; padding: 0; font-size: 16px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
    .toolbar-link.toolbar-icon { font-size: 14px; text-decoration: none; }
    .toolbar-link-with-label { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
    .toolbar-link-with-label span:first-child { font-size: 14px; }
    .popup-title { font-weight: 600; font-size: 14px; padding: 6px 8px; border-bottom: 1px solid #eee; flex-shrink: 0; }
    .list { flex: 1; overflow-y: auto; padding: 8px; }
    .task { padding: 8px 10px; border-radius: 6px; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; transition: background 0.15s, border-color 0.15s; }
    .task:hover { background: #f5f5f5; border-color: #e8e8e8; }
    .task.completed { opacity: 0.65; }
    .task.completed .task-title { text-decoration: line-through; color: #666; }
    .task input[type="checkbox"] { flex-shrink: 0; cursor: pointer; }
    .task-title { flex: 1; min-width: 0; word-break: break-word; font-size: 13px; line-height: 1.35; }
    .task-delete-btn { flex-shrink: 0; width: 22px; height: 22px; padding: 0; font-size: 16px; line-height: 1; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; color: #666; display: inline-flex; align-items: center; justify-content: center; }
    .task-delete-btn:hover { background: #fee; color: #c00; border-color: #c00; }
    .task-delete-btn:focus { outline: 1px solid #0a84ff; outline-offset: 1px; }
    .empty { color: #888; padding: 1rem; text-align: center; }
    .error { color: #c00; padding: 8px; font-size: 12px; }
    .edit-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 10; align-items: center; justify-content: center; }
    .edit-overlay.visible { display: flex; }
    .edit-dialog { background: #fff; padding: 1rem; border-radius: 8px; min-width: 280px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
    .edit-dialog h3 { margin: 0 0 8px 0; font-size: 13px; }
    .edit-dialog input { width: 100%; padding: 6px 8px; margin-bottom: 10px; box-sizing: border-box; }
    .edit-dialog .buttons { display: flex; gap: 8px; justify-content: flex-end; }
    .task-priority-badge { font-weight: 700; min-width: 1.1em; margin-right: 4px; flex-shrink: 0; }
    .task-priority-a { color: #c00; }
    .task-priority-b { color: #d66; }
    .task-priority-c { color: #888; }
    .task-due { font-size: 11px; color: #666; margin-left: 4px; flex-shrink: 0; display: inline-flex; align-items: center; gap: 2px; }
    .btn-primary { background: #0a84ff; color: #fff; border-color: #0a84ff; }
    .btn-primary:hover { background: #0060df; border-color: #0060df; }
    .btn-primary:focus { outline: 1px solid #0a84ff; outline-offset: 1px; }
    .task { border-bottom: 1px solid #eee; }
    .list .task:last-child { border-bottom: none; }
    .task.task--overdue { border-left: 3px solid #c00; }
    .task.task--priority-high { border-left: 3px solid #0a84ff; }
    .task.task--overdue.task--priority-high { border-left-color: #c00; }
  </style>
</head>
<body>
  <div class="popup-title" id="popup-title">Todo.txt</div>
  <div class="toolbar">
    <div class="toolbar-primary">
      <button type="button" id="refresh" class="toolbar-icon" aria-label="Refresh task list" title="">⟳</button>
      <input type="text" id="new-task" placeholder="New task…" style="flex:1; min-width: 60px; padding:4px 6px; font-size:12px;">
      <button type="button" id="add-task" class="toolbar-icon btn-primary" aria-label="Add task" title="">+</button>
      <span id="add-feedback" style="display:none; font-size:11px; color:#080;" aria-live="polite"></span>
    </div>
    <div class="toolbar-secondary">
      <a href="#" id="open-tab" class="toolbar-link toolbar-link-with-label" title="" aria-label="Open full view"><span aria-hidden="true">⧉</span><span id="open-tab-label"></span></a>
      <a href="#" id="open-options" class="toolbar-link toolbar-icon" title="" aria-label="Options">⚙</a>
    </div>
  </div>
  <div id="error" class="error" style="display:none;" role="alert" aria-live="polite"></div>
  <div id="list" class="list" role="list" aria-label="Task list">
    <div class="empty">Loading…</div>
  </div>
  <div id="edit-overlay" class="edit-overlay">
    <div class="edit-dialog">
      <h3 id="edit-dialog-title">Edit task title</h3>
      <input type="text" id="edit-task-input" />
      <div class="buttons">
        <button type="button" id="edit-cancel">Cancel</button>
        <button type="button" id="edit-save">Save</button>
      </div>
    </div>
  </div>
  <script src="../lib/i18nHelper.js"></script>
  <script src="../lib/priorityDisplay.js"></script>
  <script src="popup.js"></script>
</body>
</html>
