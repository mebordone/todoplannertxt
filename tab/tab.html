<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Todo.txt – Full view</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; font-size: 13px; display: flex; flex-direction: column; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; width: 100%; padding: 0 1rem; display: flex; flex-direction: column; flex: 1; }
    .toolbar { padding: 12px 8px; border-bottom: 1px solid #ccc; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .toolbar button { padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    .toolbar-secondary { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .toolbar-link { display: inline-block; border: 1px solid #ccc; border-radius: 4px; padding: 6px 12px; font-size: 13px; text-decoration: none; color: inherit; background: transparent; cursor: pointer; }
    .toolbar-link:hover { background: #f0f0f0; border-color: #aaa; }
    .toolbar-hint { font-size: 11px; color: #888; margin-left: 8px; }
    .list { flex: 1; overflow-y: auto; padding: 12px; }
    .task { padding: 8px 10px; border-radius: 4px; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
    .task:hover { background: #f0f0f0; }
    .task.completed { opacity: 0.7; }
    .task.completed .task-title { text-decoration: line-through; }
    .task input[type="checkbox"] { flex-shrink: 0; }
    .task-title { flex: 1; word-break: break-word; }
    .task-meta { font-size: 11px; color: #666; margin-top: 2px; }
    .empty { color: #888; padding: 2rem; text-align: center; }
    .error { color: #c00; padding: 12px; font-size: 12px; }
    a { color: #0a84ff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <button type="button" id="refresh">Refresh</button>
      <input type="text" id="new-task" placeholder="New task…" style="flex:1; min-width: 200px; padding: 6px 8px; font-size: 13px;">
      <button type="button" id="add-task">Add</button>
      <div class="toolbar-secondary">
        <button type="button" id="quick-view" class="toolbar-link" title="Open quick view (pending tasks only)">Quick view</button>
        <a href="#" id="open-options" class="toolbar-link">Options</a>
        <span class="toolbar-hint" id="toolbar-hint">Toolbar icon is visible in the Mail tab.</span>
      </div>
    </div>
    <div id="error" class="error" style="display:none;"></div>
    <div id="list" class="list">
      <div class="empty">Loading…</div>
    </div>
  </div>
  <script src="tab.js"></script>
</body>
</html>
