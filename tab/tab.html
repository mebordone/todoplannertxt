<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Todo.txt – Full view</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; font-size: 13px; display: flex; flex-direction: column; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; width: 100%; padding: 0 1rem; display: flex; flex-direction: column; flex: 1; }
    .toolbar { padding: 12px 8px; border-bottom: 1px solid #ccc; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .toolbar button { padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    .toolbar-secondary { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .toolbar-link { display: inline-block; border: 1px solid #ccc; border-radius: 4px; padding: 6px 12px; font-size: 13px; text-decoration: none; color: inherit; background: transparent; cursor: pointer; }
    .toolbar-link:hover { background: #f0f0f0; border-color: #aaa; }
    .toolbar-hint { font-size: 11px; color: #888; margin-left: 8px; }
    .list { flex: 1; overflow-y: auto; padding: 12px; }
    .task { padding: 8px 10px; border-radius: 4px; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
    .task:hover { background: #f0f0f0; }
    .task.completed { opacity: 0.7; }
    .task.completed .task-title { text-decoration: line-through; }
    .task input[type="checkbox"] { flex-shrink: 0; }
    .task-title { flex: 1; word-break: break-word; }
    .task-meta { font-size: 11px; color: #666; margin-top: 2px; }
    .task-priority-badge { font-weight: 700; min-width: 1.1em; margin-right: 4px; flex-shrink: 0; }
    .task-priority-a { color: #c00; }
    .task-priority-b { color: #d66; }
    .task-priority-c { color: #888; }
    .task-meta .task-due-icon { margin-right: 2px; }
    .btn-primary { background: #0a84ff; color: #fff; border-color: #0a84ff; }
    .btn-primary:hover { background: #0060df; border-color: #0060df; }
    .btn-primary:focus { outline: 1px solid #0a84ff; outline-offset: 1px; }
    .task { border-bottom: 1px solid #eee; }
    .list .task:last-child { border-bottom: none; }
    .task.task--overdue { border-left: 3px solid #c00; }
    .task.task--priority-high { border-left: 3px solid #0a84ff; }
    .task.task--overdue.task--priority-high { border-left-color: #c00; }
    .empty { color: #888; padding: 2rem; text-align: center; }
    .error { color: #c00; padding: 12px; font-size: 12px; }
    a { color: #0a84ff; }
    .toolbar-filters { flex-wrap: wrap; gap: 6px; }
    .toolbar-filters label { display: inline-flex; align-items: center; gap: 4px; }
    .filter-label { font-size: 11px; color: #666; white-space: nowrap; }
    .toolbar-filters select { padding: 4px 6px; font-size: 12px; min-width: 0; }
    .filter-search { padding: 4px 8px; font-size: 12px; }
    .filters-section { border-bottom: 1px solid #eee; }
    .filters-bar-header { padding: 6px 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; }
    .filters-bar-header:hover { background: #f5f5f5; }
    .filters-bar-header .chevron { font-size: 10px; transition: transform 0.2s; }
    .filters-section.collapsed .chevron { transform: rotate(-90deg); }
    .filters-section.collapsed .toolbar-filters { display: none; }
    .syntax-hint-bar { padding: 4px 8px 2px; font-size: 11px; color: #777; display: flex; align-items: center; gap: 6px; }
    .syntax-hint-text { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .syntax-toggle { border: none; background: transparent; cursor: pointer; font-size: 11px; padding: 0 4px; color: #666; border-radius: 3px; }
    .syntax-toggle:hover { background: #f0f0f0; }
    .syntax-section { border-bottom: 1px solid #eee; }
    .syntax-section.collapsed .syntax-content { display: none; }
    .syntax-content { padding: 6px 8px 8px; font-size: 11px; color: #555; background: #fafafa; }
    .syntax-title { font-weight: 600; margin-bottom: 4px; }
    .syntax-list { margin: 0 0 4px; padding-left: 16px; }
    .syntax-list li { margin: 0 0 2px; }
    .syntax-example { margin: 2px 0 4px; }
    .syntax-example-label { font-weight: 600; margin-right: 4px; }
    .syntax-content code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 11px; background: #f0f0f0; padding: 1px 3px; border-radius: 3px; }
    .syntax-more-link { font-size: 11px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <button type="button" id="refresh" aria-label="Refresh task list">Refresh</button>
      <input type="text" id="new-task" placeholder="New task…" style="flex:1; min-width: 200px; padding: 6px 8px; font-size: 13px;">
      <button type="button" id="add-task" class="btn-primary" aria-label="Add task">Add</button>
      <span id="add-feedback" class="toolbar-hint" style="display:none;" aria-live="polite"></span>
      <div class="toolbar-secondary">
        <button type="button" id="quick-view" class="toolbar-link" title="">Quick view</button>
        <a href="#" id="open-options" class="toolbar-link">Options</a>
        <span class="toolbar-hint" id="toolbar-hint">Toolbar icon is visible in the Mail tab.</span>
      </div>
    </div>
    <div id="syntax-hint-bar" class="syntax-hint-bar">
      <span id="syntax-hint-text" class="syntax-hint-text"></span>
      <button type="button" id="syntax-toggle" class="syntax-toggle" aria-expanded="false" aria-controls="syntax-section">
        ▼
      </button>
    </div>
    <div id="syntax-section" class="syntax-section collapsed">
      <div class="syntax-content">
        <div id="syntax-title" class="syntax-title"></div>
        <ul class="syntax-list">
          <li id="syntax-line-priority"></li>
          <li id="syntax-line-created"></li>
          <li id="syntax-line-project-context"></li>
          <li id="syntax-line-due"></li>
          <li id="syntax-line-completed"></li>
        </ul>
        <div class="syntax-example">
          <span id="syntax-example-label" class="syntax-example-label"></span>
          <code id="syntax-example-text"></code>
        </div>
        <a href="https://github.com/todotxt/todo.txt" target="_blank" rel="noopener noreferrer" id="syntax-more-link" class="syntax-more-link"></a>
      </div>
    </div>
    <div id="filters-section" class="filters-section">
      <div id="filters-bar-header" class="filters-bar-header" role="button" tabindex="0">
        <span class="filter-label" id="label-filters">Filters & view</span>
        <span class="chevron" aria-hidden="true">▼</span>
      </div>
      <div class="toolbar toolbar-filters" id="filters-bar">
        <input type="text" id="search" placeholder="Search…" class="filter-search" style="min-width: 120px;">
        <label><span class="filter-label" id="label-project">Project</span><select id="filter-project"></select></label>
        <label><span class="filter-label" id="label-context">Context</span><select id="filter-context"></select></label>
        <label><span class="filter-label" id="label-priority">Priority</span><select id="filter-priority"></select></label>
        <label><span class="filter-label" id="label-due">Due</span><select id="filter-due"></select></label>
        <label><span class="filter-label" id="label-completion">Status</span><select id="filter-completion"></select></label>
        <label><span class="filter-label" id="label-sort">Sort by</span><select id="sort-by"></select></label>
        <label><select id="sort-dir"><option value="asc"></option><option value="desc"></option></select></label>
        <label><span class="filter-label" id="label-group">Group by</span><select id="group-by"></select></label>
        <label><span class="filter-label" id="label-default-view">Default view</span><select id="default-view-preset"></select></label>
        <button type="button" id="view-today" class="toolbar-link" aria-label="View today">Today</button>
        <button type="button" id="reset-filters-btn" class="toolbar-link" style="margin-left:4px;" aria-label="Reset filters">Reset filters</button>
      </div>
    </div>
    <div id="error" class="error" style="display:none;" role="alert" aria-live="polite"></div>
    <div id="today-summary" class="toolbar-hint" style="display:none; padding: 4px 0;"></div>
    <div id="task-count" class="toolbar-hint" style="display:none; padding: 4px 0;"></div>
    <div id="list" class="list" role="list" aria-label="Task list">
      <div class="empty">Loading…</div>
    </div>
  </div>
  <script src="../lib/i18nHelper.js"></script>
  <script src="../lib/priorityDisplay.js"></script>
  <script src="filterSort.js"></script>
  <script src="tab.js"></script>
</body>
</html>
